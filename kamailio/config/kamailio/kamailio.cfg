#!KAMAILIO

####### Global Parameters #########

debug=2
log_stderror=no
log_facility=LOG_LOCAL0

fork=yes
children=4

listen=udp:0.0.0.0:5060 advertise 34.1.59.164:5060
listen=tcp:0.0.0.0:5060 advertise 34.1.59.164:5060

# TODO: set to your VM's public IP
alias="34.1.59.164"

####### Preprocessor Defines #########

#!define LIVEKIT_HOST "5guehh40llu.sip.livekit.cloud"
#!define LIVEKIT_DEST "sip:5guehh40llu.sip.livekit.cloud"

####### Modules Section ########

loadmodule "kex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"

# ----- rr params -----
modparam("rr", "append_fromtag", 0)
# Keep Kamailio in the route set when the caller and LiveKit legs use different transports.
modparam("rr", "enable_double_rr", 2)

# ----- tm params -----
modparam("tm", "failure_reply_mode", 1)
modparam("tm", "fr_timer", 30)
modparam("tm", "fr_inv_timer", 120)

# ----- ctl params -----
modparam("ctl", "binrpc", "unix:/var/run/kamailio/kamailio_ctl")

####### Routing Logic ########

request_route {
    xlog("L_INFO", "[$rm] from $si:$sp to $ru\n");

    # OPTIONS — reply locally, don't forward
    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    # sanity check
    if (!sanity_check("1511", "7")) {
        xlog("L_ERR", "Sanity check failed: $rm from $si:$sp\n");
        exit;
    }

    # max-forwards
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # CANCEL
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            route(RELAY);
        }
        exit;
    }

    # in-dialog requests (BYE, re-INVITE, ACK)
    if (has_totag()) {
        if (loose_route()) {
            route(RELAY);
        } else {
            if (is_method("ACK")) {
                if (t_check_trans()) {
                    t_relay();
                }
            } else {
                sl_send_reply("404", "Not Found");
            }
        }
        exit;
    }

    # new INVITE — record-route and proxy to LiveKit
    if (is_method("INVITE")) {
        record_route();
        xlog("L_INFO", "[$ci] New call from $fU ($si) → LiveKit\n");
    }

    $du = LIVEKIT_DEST;
    $ru = "sip:" + $rU + "@" + LIVEKIT_HOST;
    route(RELAY);
}

route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

onreply_route {
    exit;
}

failure_route[RELAY] {
    if (t_is_canceled()) {
        exit;
    }
}