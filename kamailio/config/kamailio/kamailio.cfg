#!KAMAILIO

####### Global Parameters #########

debug=2
log_stderror=no
log_facility=LOG_LOCAL0

fork=yes
children=4

listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060

# TODO: uncomment and set to your VM's public IP
# alias="TODO_YOUR_VM_PUBLIC_IP"

####### Preprocessor Defines #########

# TODO: set to your LiveKit SIP trunk host
#!define LIVEKIT_DEST "sip:TODO_LIVEKIT_SIP_HOST:5060"

####### Modules Section ########

loadmodule "kex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"

# ----- rr params -----
modparam("rr", "append_fromtag", 0)

# ----- tm params -----
modparam("tm", "failure_reply_mode", 3)
modparam("tm", "fr_timer", 30)
modparam("tm", "fr_inv_timer", 120)

# ----- ctl params -----
modparam("ctl", "binrpc", "unix:/var/run/kamailio/kamailio_ctl")

####### Routing Logic ########

request_route {
    # sanity check
    if (!sanity_check("1511", "7")) {
        xlog("L_ERR", "Malformed SIP message from $si:$sp\n");
        exit;
    }

    # max-forwards
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    # CANCEL
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            route(RELAY);
        }
        exit;
    }

    # in-dialog requests (BYE, re-INVITE, ACK)
    if (has_totag()) {
        if (loose_route()) {
            route(RELAY);
        } else {
            if (is_method("ACK")) {
                if (t_check_trans()) {
                    t_relay();
                }
            } else {
                sl_send_reply("404", "Not Found");
            }
        }
        exit;
    }

    # new INVITE — record-route and proxy to LiveKit
    if (is_method("INVITE")) {
        record_route();
        xlog("L_INFO", "[$ci] New call from $fU ($si) → LiveKit\n");
    }

    $du = LIVEKIT_DEST;
    route(RELAY);
}

route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

onreply_route {
    exit;
}

failure_route[RELAY] {
    if (t_is_canceled()) {
        exit;
    }
}
